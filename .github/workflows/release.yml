name: Build Release Executable

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Build executable
      run: uv run pArtifact (for manual runs)
      uses: actions/upload-artifact@v4
      with:
        name: win-helper-exe
        path: dist/win-helper.exe

    - name: Upload Release Asset
      if: github.event_name == 'release'noconfirm --noconsole --onefile --add-data "scripts;scripts" --add-data "icon;icon" --icon "icon/app.ico" --name "win-helper" main.py

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/win-helper.exe
